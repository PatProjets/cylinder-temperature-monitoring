<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thermo ESP32 - Web BLE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body { font-family: Arial; padding: 20px; }
  .value { font-size: 1.6em; margin: 10px 0; }
  button { padding: 10px 20px; font-size: 1.2em; margin-bottom: 20px; }

  /* Conteneur unique pour les 4 graphes superposés */
  #overlayContainer {
    position: relative;
    height: 350px;
    max-width: 100%;
    margin-top: 30px; /* espace pour éviter que le graphe recouvre l'input */
    background: #f5f5f5;
    border: 1px solid #ccc;
  }

  /* Chaque canvas occupe exactement la même zone */
  .overlayChart {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    pointer-events: none;
  }

  /* Légende manuelle */
  #legend {
    margin-top: 10px;
    font-size: 1.2em;
  }
  #legend span {
    margin-right: 15px;
  }

  /* Champ seuil toujours visible */
  #limitInput, #applyLimit {
    position: relative;
    z-index: 10;
  }
  
  #chart1 { z-index: 1; }
  #chart2 { z-index: 2; }
  #chart3 { z-index: 3; }
  #chart4 { z-index: 4; }
  
</style>
</head>

<body>

<h1>Thermo ESP32 - Web BLE</h1>
<button id="connect">Connecter au Nano ESP32</button>

<h2>Températures</h2>
<div class="value">T1 : <span id="t1">--</span> °C</div>
<div class="value">T2 : <span id="t2">--</span> °C</div>
<div class="value">T3 : <span id="t3">--</span> °C</div>
<div class="value">T4 : <span id="t4">--</span> °C</div>

<h2>Réglage du seuil d’alerte</h2>
<div>
  <input id="limitInput" type="number" value="300" min="0" max="350" style="font-size:1.2em; width:80px;">
  <button id="applyLimit">OK</button>
</div>

<h2>Graphes superposés</h2>
<div id="overlayContainer">
  <canvas id="chart1" class="overlayChart"></canvas>
  <canvas id="chart2" class="overlayChart"></canvas>
  <canvas id="chart3" class="overlayChart"></canvas>
  <canvas id="chart4" class="overlayChart"></canvas>
</div>

<div id="legend">
  <span style="color:#d32f2f">■</span> T1
  <span style="color:#1976d2">■</span> T2
  <span style="color:#388e3c">■</span> T3
  <span style="color:#f57c00">■</span> T4
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
// -----------------------------
// CONFIGURATION
// -----------------------------
let TEMP_LIMIT = 300;  // seuil dynamique

const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";

const CHAR_UUIDS = {
  t1: "12345678-1234-1234-1234-1234567890a1",
  t2: "12345678-1234-1234-1234-1234567890a2",
  t3: "12345678-1234-1234-1234-1234567890a3",
  t4: "12345678-1234-1234-1234-1234567890a4"
};



// -----------------------------
// 4 CHARTS INDÉPENDANTS SUPERPOSÉS
// -----------------------------
let charts = {};

function createChart(canvasId, label, color) {
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderColor: color,
        backgroundColor: color.replace('1)', '0.2)').replace('rgb', 'rgba'),
        borderWidth: 2,
        tension: 0.2
      }]
    },
    options: {
      animation: false,
      maintainAspectRatio: false,
      layout: { padding: 0 },
      plugins: { legend: { display: false }, limitLine: true },
      scales: {
        x: { display: false },
        y: { min: 0, max: 350 }
      }
    }
  });
}

charts.t1 = createChart("chart1", "T1", "rgba(211,47,47,1)");
charts.t2 = createChart("chart2", "T2", "rgba(25,118,210,1)");
charts.t3 = createChart("chart3", "T3", "rgba(56,142,60,1)");
charts.t4 = createChart("chart4", "T4", "rgba(245,124,0,1)");

// -----------------------------
// MISE À JOUR DES 4 CHARTS
// -----------------------------
function updateCharts(key, value) {
  const now = new Date().toLocaleTimeString();

  const chart = charts[key];
  chart.data.labels.push(now);
  chart.data.datasets[0].data.push(value);

  if (chart.data.labels.length > 60) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}



// -----------------------------
// RÉGLAGE DU SEUIL D’ALERTE
// -----------------------------
document.getElementById("applyLimit").addEventListener("click", () => {
  const newLimit = parseFloat(document.getElementById("limitInput").value);

  if (!isNaN(newLimit) && newLimit >= 0 && newLimit <= 350) {
    TEMP_LIMIT = newLimit;

    // Mise à jour immédiate des 4 graphes
    Object.values(charts).forEach(chart => chart.update());
  }
});

// -----------------------------
// PLUGIN LIGNE ROUGE
// -----------------------------
const limitLine = {
  id: 'limitLine',
  afterDraw(chart) {
    const yScale = chart.scales.y;
    const ctx = chart.ctx;
    const y = yScale.getPixelForValue(TEMP_LIMIT);

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(chart.chartArea.left, y);
    ctx.lineTo(chart.chartArea.right, y);
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.stroke();
    ctx.restore();
  }
};

// -----------------------------
// CONNEXION BLE
// -----------------------------
async function connectBLE() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    for (const key in CHAR_UUIDS) {
      const char = await service.getCharacteristic(CHAR_UUIDS[key]);
      await char.startNotifications();

      char.addEventListener("characteristicvaluechanged", event => {
        const dv = event.target.value;
        const temp = dv.getFloat32(0, true);

        const span = document.getElementById(key);
        span.textContent = temp.toFixed(2);

        if (temp > TEMP_LIMIT) {
          span.style.color = "red";
          span.style.fontWeight = "bold";
          document.getElementById("beep").play();
        } else {
          span.style.color = "black";
          span.style.fontWeight = "normal";
        }

        updateCharts(key, temp);
      });
    }

    alert("Connecté !");
  }
  catch (error) {
    alert("Erreur BLE : " + error);
  }
}

document.getElementById("connect").addEventListener("click", connectBLE);
</script>

</body>
</html>
