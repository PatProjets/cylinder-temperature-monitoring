<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Thermo ESP32 - Web BLE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body { font-family: Arial; padding: 20px; }
  .value { font-size: 1.6em; margin: 10px 0; }
  button { padding: 10px 20px; font-size: 1.2em; margin-bottom: 20px; }

  #overlayContainer {
    position: relative;
    height: 350px;
    max-width: 100%;
    margin-top: 30px;
    background: #f5f5f5;
    border: 1px solid #ccc;
  }

  .overlayChart {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    pointer-events: none;
  }

  /* Canvas dédié à la ligne rouge */
  #limitCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #chart1 { z-index: 1; }
  #chart2 { z-index: 2; }
  #chart3 { z-index: 3; }
  #chart4 { z-index: 4; }

  #legend {
    margin-top: 10px;
    font-size: 1.2em;
  }
  #legend span {
    margin-right: 25px;
  }

  #limitInput, #applyLimit {
    position: relative;
    z-index: 20;
  }
  
 .temp-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin: 10px 0;
  }

  .temp-box {
    flex: 1;
    background: #f5f5f5;
    border: 1px solid #ccc;
    padding: 12px 0;
    border-radius: 6px;
    text-align: center;
    font-size: 1.4em;
    font-weight: bold;
    min-width: 60px;
  }

</style>
</head>

<body>

<h1>Thermo ESP32 - Web BLE</h1>
<button id="connect">Connecter au Nano ESP32</button>

<h2>Températures</h2>

<div class="temp-row">
  <div class="temp-box">Cyl 1 : <span id="t1">--</span> °C</div>
  <div class="temp-box">Cyl 2 : <span id="t2">--</span> °C</div>
  <div class="temp-box">Cyl 3 : <span id="t3">--</span> °C</div>
  <div class="temp-box">Cyl 4 : <span id="t4">--</span> °C</div>
</div>


<h2>Réglage du seuil d’alerte</h2>
<div>
  <input id="limitInput" type="number" value="50" min="0" max="350" style="font-size:1.2em; width:80px;">
  <button id="applyLimit">OK</button>
</div>

<h2>Graphes superposés</h2>
<div id="overlayContainer">
  <canvas id="chart1" class="overlayChart"></canvas>
  <canvas id="chart2" class="overlayChart"></canvas>
  <canvas id="chart3" class="overlayChart"></canvas>
  <canvas id="chart4" class="overlayChart"></canvas>

  <!-- Canvas indépendant pour la ligne rouge -->
  <canvas id="limitCanvas"></canvas>
</div>

<div id="legend">
  <span style="color:#d32f2f">   ■</span>T1   
  <span style="color:#1976d2">   ■</span>T2   
  <span style="color:#388e3c">   ■</span>T3   
  <span style="color:#f57c00">   ■</span>T4   
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
// -----------------------------
// CONFIGURATION
// -----------------------------
let TEMP_LIMIT = 50;

const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";

const CHAR_UUIDS = {
  t1: "12345678-1234-1234-1234-1234567890a1",
  t2: "12345678-1234-1234-1234-1234567890a2",
  t3: "12345678-1234-1234-1234-1234567890a3",
  t4: "12345678-1234-1234-1234-1234567890a4"
};

// -----------------------------
// CANVAS LIGNE ROUGE (Android compatible)
// -----------------------------
const limitCanvas = document.getElementById("limitCanvas");
const limitCtx = limitCanvas.getContext("2d");

function drawLimitLine() {
  const rect = limitCanvas.getBoundingClientRect();
  limitCanvas.width = rect.width;
  limitCanvas.height = rect.height;

  // On prend le chart le plus haut (chart4)
  const chart = charts.t4;
  if (!chart) return;

  const yScale = chart.scales.y;
  const y = yScale.getPixelForValue(TEMP_LIMIT);

  limitCtx.clearRect(0, 0, limitCanvas.width, limitCanvas.height);

  limitCtx.beginPath();
  limitCtx.moveTo(chart.chartArea.left, y);
  limitCtx.lineTo(chart.chartArea.right, y);
  limitCtx.strokeStyle = "red";
  limitCtx.lineWidth = 2;
  limitCtx.setLineDash([6, 6]);
  limitCtx.stroke();
}

// -----------------------------
// 4 CHARTS INDÉPENDANTS
// -----------------------------
let charts = {};

function createChart(canvasId, label, color) {
  return new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: label,
        data: [],
        borderColor: color,
        backgroundColor: color.replace('1)', '0.2)').replace('rgb', 'rgba'),
        borderWidth: 2,
        tension: 0.2
      }]
    },
    options: {
      animation: false,
      maintainAspectRatio: false,
      layout: { padding: 0 },
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { min: 0, max: 350 }
      }
    }
  });
}

charts.t1 = createChart("chart1", "T1", "rgba(211,47,47,1)");
charts.t2 = createChart("chart2", "T2", "rgba(25,118,210,1)");
charts.t3 = createChart("chart3", "T3", "rgba(56,142,60,1)");
charts.t4 = createChart("chart4", "T4", "rgba(245,124,0,1)");

// -----------------------------
// MISE À JOUR DES CHARTS
// -----------------------------
function updateCharts(key, value) {
  const now = new Date().toLocaleTimeString();

  const chart = charts[key];
  chart.data.labels.push(now);
  chart.data.datasets[0].data.push(value);

  if (chart.data.labels.length > 60) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
  drawLimitLine();
}

// -----------------------------
// RÉGLAGE DU SEUIL
// -----------------------------
document.getElementById("applyLimit").addEventListener("click", () => {
  TEMP_LIMIT = parseFloat(document.getElementById("limitInput").value);
  drawLimitLine();
});

// -----------------------------
// CONNEXION BLE
// -----------------------------
async function connectBLE() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);

    for (const key in CHAR_UUIDS) {
      const char = await service.getCharacteristic(CHAR_UUIDS[key]);
      await char.startNotifications();

      char.addEventListener("characteristicvaluechanged", event => {
        const dv = event.target.value;
        const temp = dv.getFloat32(0, true);

        const span = document.getElementById(key);
        span.textContent = temp.toFixed(2);

        if (temp > TEMP_LIMIT) {
          span.style.color = "red";
          span.style.fontWeight = "bold";
          document.getElementById("beep").play();
        } else {
          span.style.color = "black";
          span.style.fontWeight = "normal";
        }

        updateCharts(key, temp);
      });
    }

    alert("Connecté !");
  }
  catch (error) {
    alert("Erreur BLE : " + error);
  }
}

document.getElementById("connect").addEventListener("click", connectBLE);

// Redessiner la ligne rouge au redimensionnement
window.addEventListener("resize", drawLimitLine);
</script>

</body>
</html>
